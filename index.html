<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de IMC</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 380px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #4facfe;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .resultado {
            margin-top: 15px;
            font-weight: bold;
        }

        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 6px;
        }

        th {
            background: #4facfe;
            color: white;
        }

        canvas {
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculadora IMC</h2>

    <input type="number" id="peso" placeholder="Peso (kg)">
    <input type="number" id="altura" placeholder="Altura (m)">

    <button onclick="calcularIMC()">Calcular</button>

    <div class="resultado" id="resultado"></div>
    <div id="dieta"></div>

    <canvas id="grafica"></canvas>

    <table>
        <tr><th>Rango IMC</th><th>Clasificación</th></tr>
        <tr><td>< 18.5</td><td>Bajo peso</td></tr>
        <tr><td>18.5 - 24.9</td><td>Peso normal</td></tr>
        <tr><td>25 - 29.9</td><td>Sobrepeso</td></tr>
        <tr><td>30 - 34.9</td><td>Obesidad grado I</td></tr>
        <tr><td>35 - 39.9</td><td>Obesidad grado II</td></tr>
        <tr><td>>= 40</td><td>Obesidad grado III</td></tr>
    </table>
</div>

<script>
    let chart;

    function obtenerColor(imc) {
        if (imc < 18.5) return 'yellow';
        if (imc < 25) return 'green';
        return 'red';
    }

    function calcularIMC() {
        let peso = parseFloat(document.getElementById("peso").value);
        let altura = parseFloat(document.getElementById("altura").value);

        if (!peso || !altura || altura <= 0) {
            document.getElementById("resultado").innerText = "Ingrese valores válidos";
            return;
        }

        let imc = peso / (altura * altura);
        let mensaje = "";
        let dieta = "";

        if (imc < 18.5) {
            mensaje = "Bajo peso";
            dieta = "Aumenta calorías saludables: proteínas, arroz, frutos secos.";
        } else if (imc < 25) {
            mensaje = "Peso normal";
            dieta = "Mantén dieta equilibrada y ejercicio regular.";
        } else if (imc < 30) {
            mensaje = "Sobrepeso";
            dieta = "Reduce azúcares y grasas, aumenta actividad física.";
        } else {
            mensaje = "Obesidad";
            dieta = "Consulta profesional, dieta baja en calorías y ejercicio.";
        }

        document.getElementById("resultado").innerText = `IMC: ${imc.toFixed(2)} - ${mensaje}`;
        document.getElementById("dieta").innerText = dieta;

        crearGrafica(imc);
    }

    function crearGrafica(imc) {
        const ctx = document.getElementById('grafica').getContext('2d');

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Tu IMC'],
                datasets: [{
                    label: 'Valor IMC',
                    data: [imc],
                    backgroundColor: obtenerColor(imc)
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        suggestedMax: 40
                    }
                },
                plugins: {
                    annotation: {
                        annotations: {
                            linea1: { type: 'line', yMin: 18.5, yMax: 18.5, borderColor: 'blue', borderWidth: 2 },
                            linea2: { type: 'line', yMin: 25, yMax: 25, borderColor: 'orange', borderWidth: 2 },
                            linea3: { type: 'line', yMin: 30, yMax: 30, borderColor: 'red', borderWidth: 2 }
                        }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
